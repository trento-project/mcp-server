---
name: Lib - Pipeline definition
on:
  workflow_call:
    inputs:
      run_linters:
        required: false
        type: boolean
        default: true

jobs:
  # Run all the linters.
  linters-run:
    name: Run all linters
    if: inputs.run_linters
    uses: ./.github/workflows/linters.yaml
    secrets: inherit

  # Check the result of all linters and fail if any linter failed.
  linters-result:
    name: Check linters result
    if: inputs.run_linters && always()
    needs: linters-run
    runs-on: ubuntu-24.04
    steps:
      # Fail the job if any linter did not succeed.
      - name: Check all linters result
        if: needs.linters-run.result != 'success'
        run: exit 1

  # Check go unit tests.
  test-with-go:
    name: Check Go test suite
    runs-on: ubuntu-24.04
    steps:
      # Checkout the repository.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        name: Checkout
      # Read tool versions for environment setup.
      - uses: endorama/asdf-parse-tool-versions@c981d1f09f7fad3a91bc97b6d28ce6ec0c93ded5 # v1
        name: Read .tool-versions
        id: tool-versions
      # Setup Go environment.
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ env.GOLANG_VERSION }}
      # Cache Go modules for faster builds.
      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        name: Cache Go modules
        id: go-cache
        with:
          path: ~/go/pkg/mod
          key: go-${{ env.GOLANG_VERSION }}-${{ hashFiles('**/go.sum') }}
      # Run Go unit tests.
      - name: Run go unit tests
        run: make test

  publish-containers:
    name: Publish GHCR Containers
    needs:
      - test-with-go
      - linters-result
    if: |
      (
        (github.event_name == 'push' && github.ref_name == 'main') ||
        github.event_name == 'workflow_dispatch'
      )
    strategy:
      matrix:
        include:
          - mix_env: prod
            tag: "${{ (github.event_name == 'push' && github.ref_name == 'main' && 'rolling') || github.sha }}"
    uses: trento-project/.github/.github/workflows/publish-containers.yaml@98e2a3d821253d603d16fd53fb10bcf85f64b395 # v1.0.0
    with:
      image_name: mcp-server-trento
      tag: ${{ matrix.tag }}
    secrets:
      gh_token: ${{ secrets.TRENTOBOT_GH_PAT }}
      ssh_key: ${{ secrets.TRENTOBOT_SSH_KEY }}

  # Update sum.golang.org and pkg.go.dev.
  generate-docs:
    name: Update Go docs site
    if: github.ref_name == 'main' || inputs.trigger_release
    runs-on: ubuntu-24.04
    needs:
      - publish-containers
      - test-with-go
      - linters-result
    steps:
      # Trigger docs update in Go registries.
      - uses: essentialkaos/godoc-action@1d99db5d7f1c4fc42d26c9910ea374053d6961fb # v1
        name: Trigger docs update in sum.golang.org and pkg.go.dev

  # Sync the project with OBS (Open Build Service).
  obs-sync:
    name: OBS sync
    if: vars.OBS_ENABLED == 'true' && (github.event_name == 'push' && github.ref_name == 'main') || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/obs.yaml
    needs:
      - publish-containers
      - test-with-go
      - linters-result
    secrets: inherit
    with:
      obs_project: ${{ vars.OBS_PROJECT_ROLLING }}
